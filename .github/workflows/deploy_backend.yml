name: Deploy Backend to VPS

"on":
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Push backend source files to VPS (strip_components:1 removes the leading "backend/" prefix)
      - name: Copy backend files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "backend/docker-compose.yml,backend/Dockerfile,backend/package.json,backend/package-lock.json,backend/tsconfig.json,backend/nodemon.json,backend/drizzle.config.ts,backend/src/,backend/migrations/"
          target: "~/aeropos-backend"
          strip_components: 1

      # Write .env from GitHub Secrets — never commit .env to git
      - name: Create .env on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p ~/aeropos-backend
            cat > ~/aeropos-backend/.env << 'EOF'
            NODE_ENV=production
            PORT=5004
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DATABASE_SSL=false
            DATABASE_POOL_SIZE=10
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_PORT=${{ secrets.EMAIL_PORT }}
            EMAIL_SECURE=${{ secrets.EMAIL_SECURE }}
            EMAIL_USERNAME=${{ secrets.EMAIL_USERNAME }}
            EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            COMPRESSION_THRESHOLD=10240
            MAX_BATCH_SIZE=500
            MAX_STOCK_BATCH=200
            REQUEST_TIMEOUT=5000
            EOF

      - name: Deploy containers on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/aeropos-backend
            docker compose pull || true
            docker compose up -d --build
            docker image prune -f
            echo "Deployment complete"

      - name: Run database migrations
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/aeropos-backend
            docker compose exec -T backend npm run db:migrate
            echo "Migrations complete"
