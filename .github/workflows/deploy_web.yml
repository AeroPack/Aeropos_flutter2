name: Deploy Web to VPS

"on":
  push:
    branches:
      - main
    paths:
      - "ezo/**"

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ezo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: "stable"
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ./ezo/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Build web release
        run: |
          flutter build web \
            --release \
            --no-source-maps \
            --pwa-strategy offline-first \
            --dart-define=BACKEND_URL=${{ secrets.BACKEND_URL }}

      - name: Clean build artifacts
        working-directory: ./ezo/build/web
        run: |
          find . -name "*.map" -delete
          find . -name "*.dart" -delete

      - name: Gzip compress assets
        working-directory: ./ezo/build/web
        run: |
          find . -type f \( \
            -name "*.js" -o -name "*.css" -o -name "*.html" \
            -o -name "*.json" -o -name "*.wasm" -o -name "*.svg" \
            -o -name "*.ttf" -o -name "*.otf" \
          \) -exec gzip -k -9 {} \;

      - name: Install and run Brotli compression
        working-directory: ./ezo/build/web
        run: |
          sudo apt-get install -y brotli
          find . -type f \( \
            -name "*.js" -o -name "*.css" -o -name "*.html" \
            -o -name "*.json" -o -name "*.wasm" -o -name "*.svg" \
            -o -name "*.ttf" -o -name "*.otf" \
          \) -exec brotli -k -q 11 {} \;

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy static files to VPS
        run: |
          rsync -avz \
            --delete \
            --checksum \
            --compress-level=9 \
            build/web/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/flutter_frontend/

      - name: Reload Nginx
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "sudo nginx -s reload"