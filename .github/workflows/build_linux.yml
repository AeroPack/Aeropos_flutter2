name: Build Linux

"on":
  push:
    branches:
      - main
    paths:
      - "ezo/**"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ezo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad gstreamer1.0-libav gstreamer1.0-alsa gstreamer1.0-pulseaudio

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: "stable"
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get
          
      - name: Build Linux release
        run: flutter build linux --release --dart-define=BACKEND_URL=${{ secrets.BACKEND_URL }}

      - name: Upload Linux build artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: ezo/build/linux/x64/release/bundle/
          retention-days: 14
          if-no-files-found: error
